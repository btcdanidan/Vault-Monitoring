services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-defi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defi}
      POSTGRES_DB: ${POSTGRES_DB:-defi_vault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-defi}:${POSTGRES_PASSWORD:-defi}@postgres:5432/${POSTGRES_DB:-defi_vault}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/admin/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  celery_worker_critical:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    command: celery -A workers.celery_app:app worker --loglevel=info --concurrency=2 -Q critical -n critical@%h
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celery_worker:${CELERY_DB_PASSWORD:-celery_worker_password}@postgres:5432/${POSTGRES_DB:-defi_vault}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:app inspect ping -d critical@$$HOSTNAME || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker_default1:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    command: celery -A workers.celery_app:app worker --loglevel=info --concurrency=2 -Q default -n default1@%h
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celery_worker:${CELERY_DB_PASSWORD:-celery_worker_password}@postgres:5432/${POSTGRES_DB:-defi_vault}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:app inspect ping -d default1@$$HOSTNAME || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_worker_default2:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    command: celery -A workers.celery_app:app worker --loglevel=info --concurrency=2 -Q default -n default2@%h
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celery_worker:${CELERY_DB_PASSWORD:-celery_worker_password}@postgres:5432/${POSTGRES_DB:-defi_vault}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_app:app inspect ping -d default2@$$HOSTNAME || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  celery_beat:
    build:
      context: ..
      dockerfile: workers/Dockerfile
    command: celery -A workers.celery_app:app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://celery_worker:${CELERY_DB_PASSWORD:-celery_worker_password}@postgres:5432/${POSTGRES_DB:-defi_vault}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r=>{r.resume();process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: {}
