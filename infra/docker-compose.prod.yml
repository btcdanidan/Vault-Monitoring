# Production overrides: use built images, no hot-reload, Nginx SSL + Certbot
# Usage: DOMAIN=vault.example.com docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# Requires: initial certificate from infra/scripts/init-ssl.sh before first start

services:
  backend:
    environment:
      ENVIRONMENT: production

  frontend:
    environment:
      NODE_ENV: production

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "https://127.0.0.1:443/", "--no-check-certificate"]
      interval: 10s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $$!; done"]

volumes:
  letsencrypt: {}
  certbot_webroot: {}
